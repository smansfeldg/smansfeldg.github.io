name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Must match the pnpm major that generated pnpm-lock.yaml (v9 format)
      # and that understands the allowBuilds key in pnpm-workspace.yaml.
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build with Astro
        env:
          GITHUB_PAGES_ORIGIN: ${{ steps.pages.outputs.origin }}
          GITHUB_PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
